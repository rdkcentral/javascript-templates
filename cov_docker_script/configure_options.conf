# MoCA Agent Configure Options
# This file contains autotools configure options for the moca-agent component
# Each section can be edited independently for better maintainability

# ============================================================================
# CPPFLAGS - Preprocessor flags (includes and defines)
# ============================================================================
[CPPFLAGS]
# Autotools configuration
-DHAVE_CONFIG_H

# Include paths
-I$HOME/usr/include/rdkb/
-I/usr/include/dbus-1.0
-I/usr/lib/x86_64-linux-gnu/dbus-1.0/include

# ANSC framework defines
-D_ANSC_USER
-D_ANSC_LINUX
-D_ANSC_LITTLE_ENDIAN_

# Core system defines
-DDUK_USE_PROMISE_BUILTIN
-DDUK_CMDLINE_PRINTALERT_SUPPORT
-DDUK_CMDLINE_CONSOLE_SUPPORT
-DDUK_CMDLINE_LOGGING_SUPPORT
-DDUK_CMDLINE_MODULE_SUPPORT

# Build system
-DBUILD_RDK=ON

# Security and debugging
-DENABLE_SA_KEY
-D_NO_EXECINFO_H_
-D_DEBUG
-DINCLUDE_BREAKPAD

# Standard defines
-D_GNU_SOURCE
-D__USE_XOPEN

# ============================================================================
# CFLAGS - Compiler flags
# ============================================================================
[CFLAGS]
-ffunction-sections
-fdata-sections
-fomit-frame-pointer
-fno-strict-aliasing

# ============================================================================
# LDFLAGS - Linker flags
# ============================================================================
[LDFLAGS]
-L$HOME/usr/local/lib
-L/usr/lib/x86_64-linux-gnu
-Wl,--allow-shlib-undefined
-Wl,--unresolved-symbols=ignore-all
-Wl,--no-as-needed
